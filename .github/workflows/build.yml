name: Build dylib
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build for iOS
        run: |
          # 显式指定 iOS SDK 路径
          SDK=/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk
          
          # 如果默认路径不存在，找一下
          if [ ! -d "$SDK" ]; then
            SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          fi
          
          echo "Using SDK: $SDK"
          
          clang -arch arm64 \
                -fobjc-arc \
                -dynamiclib \
                -O2 \
                -isysroot "$SDK" \
                -miphoneos-version-min=12.0 \
                -framework Foundation \
                -framework CFNetwork \
                -o LeitingBypass.dylib \
                LeitingBypass.m
                
          # 验证平台
          file LeitingBypass.dylib
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LeitingBypass.dylib
          path: LeitingBypass.dylib
