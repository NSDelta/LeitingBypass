name: Build dylib
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          clang -arch arm64 -fobjc-arc -dynamiclib -O2 \
                -framework Foundation -framework CFNetwork \
                -o LeitingBypass.dylib LeitingBypass.m
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LeitingBypass.dylib
          path: LeitingBypass.dylib
