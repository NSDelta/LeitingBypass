name: Build dylib
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          # 先安装 iOS SDK（实际上 macOS 自带 iOS SDK）
          xcrun --sdk iphoneos --show-sdk-path
          
          # 编译为 iOS dylib
          clang -arch arm64 \
                -fobjc-arc \
                -dynamiclib \
                -O2 \
                -framework Foundation \
                -framework CFNetwork \
                -o LeitingBypass.dylib \
                LeitingBypass.m \
                -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
                -miphoneos-version-min=12.0
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LeitingBypass.dylib
          path: LeitingBypass.dylib
